<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f4f3ef">
    <meta name="description" content="rexondex의 하루와 생각을 모은 달력형 기록 보관소">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="apple-touch-icon" href="./favicon.svg">
    <title>Thoughts — Calendar Archive</title>

    <script>
        (() => {
            const savedTheme = localStorage.getItem('thoughts-theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.dataset.theme = savedTheme || (systemDark ? 'dark' : 'light');
        })();
    </script>

    <script src="./daily.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Serif+KR:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            color-scheme: light;
            --bg: #f4f3ef;
            --surface: #faf9f6;
            --surface-strong: #ffffff;
            --text: #11110f;
            --muted: #807f78;
            --faint: #aaa9a2;
            --line: #dcdad3;
            --line-soft: #e9e7e1;
            --inverse: #11110f;
            --inverse-text: #ffffff;
            --hover: #eceae4;
            --shadow: 0 28px 80px rgba(26, 24, 19, 0.12);
            --overlay: rgba(12, 12, 10, 0.44);
            --radius-lg: 28px;
            --radius-md: 18px;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --bg: #0f0f0e;
            --surface: #151514;
            --surface-strong: #1b1b19;
            --text: #f1f0eb;
            --muted: #92918a;
            --faint: #686761;
            --line: #34332f;
            --line-soft: #272622;
            --inverse: #f1f0eb;
            --inverse-text: #11110f;
            --hover: #232320;
            --shadow: 0 30px 90px rgba(0, 0, 0, 0.52);
            --overlay: rgba(0, 0, 0, 0.72);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-width: 320px;
            background: var(--bg);
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at 80% -10%, color-mix(in srgb, var(--text) 4%, transparent), transparent 30rem),
                var(--bg);
            color: var(--text);
            font-family: "DM Sans", sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background-color 240ms ease, color 240ms ease;
        }

        body.dialog-open {
            overflow: hidden;
        }

        button,
        select {
            color: inherit;
            font: inherit;
        }

        button,
        a {
            -webkit-tap-highlight-color: transparent;
        }

        button:focus-visible,
        a:focus-visible,
        select:focus-visible {
            outline: 2px solid var(--text);
            outline-offset: 3px;
        }

        .shell {
            width: min(100% - 48px, 1320px);
            margin: 0 auto;
            padding: 32px 0 44px;
        }

        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 48px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
            text-decoration: none;
        }

        .brand-mark {
            display: grid;
            width: 34px;
            height: 34px;
            place-items: center;
            border: 1px solid var(--text);
            border-radius: 50%;
            font-family: "Noto Serif KR", serif;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .brand-name {
            font-size: 0.84rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .icon-button,
        .icon-link {
            display: grid;
            width: 42px;
            height: 42px;
            place-items: center;
            border: 0;
            border-radius: 50%;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            text-decoration: none;
            transition: background-color 180ms ease, transform 180ms ease;
        }

        .icon-button:hover,
        .icon-link:hover {
            background: var(--hover);
            transform: translateY(-1px);
        }

        .icon-button svg,
        .icon-link svg {
            width: 18px;
            height: 18px;
        }

        .theme-icon-moon,
        html[data-theme="dark"] .theme-icon-sun {
            display: none;
        }

        html[data-theme="dark"] .theme-icon-moon {
            display: block;
        }

        .intro {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 40px;
            padding: clamp(68px, 9vw, 130px) 0 clamp(38px, 5vw, 66px);
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            width: 28px;
            height: 1px;
            background: currentColor;
            content: "";
        }

        .intro h1 {
            max-width: 780px;
            margin: 0;
            font-family: "Noto Serif KR", serif;
            font-size: clamp(2.55rem, 5.6vw, 5.5rem);
            font-weight: 400;
            letter-spacing: -0.055em;
            line-height: 1.1;
        }

        .intro h1 em {
            color: var(--muted);
            font-style: normal;
            font-weight: 300;
        }

        .intro-copy {
            max-width: 320px;
            margin: 0 0 8px;
            color: var(--muted);
            font-family: "Noto Serif KR", serif;
            font-size: 0.92rem;
            line-height: 1.8;
            word-break: keep-all;
        }

        .calendar-layout {
            display: grid;
            grid-template-columns: 236px minmax(0, 1fr);
            overflow: hidden;
            min-height: 690px;
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: var(--surface);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .archive-nav {
            display: flex;
            flex-direction: column;
            padding: 32px 26px;
            border-right: 1px solid var(--line);
            background: color-mix(in srgb, var(--surface) 88%, var(--bg));
        }

        .section-label {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 0.66rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .year-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 34px;
        }

        .year-button {
            border: 0;
            border-radius: 999px;
            padding: 8px 12px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: background-color 180ms ease, color 180ms ease;
        }

        .year-button:hover {
            background: var(--hover);
            color: var(--text);
        }

        .year-button.is-active {
            background: var(--inverse);
            color: var(--inverse-text);
        }

        .month-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
        }

        .month-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 42px;
            border: 0;
            border-radius: 11px;
            padding: 0 11px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.78rem;
            transition: background-color 180ms ease, color 180ms ease;
        }

        .month-button:hover {
            background: var(--hover);
            color: var(--text);
        }

        .month-button.is-active {
            background: var(--hover);
            color: var(--text);
            font-weight: 600;
        }

        .month-count {
            display: grid;
            min-width: 18px;
            height: 18px;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 50%;
            color: var(--muted);
            font-size: 0.58rem;
            line-height: 1;
        }

        .month-count:empty {
            border-color: transparent;
        }

        .archive-summary {
            margin-top: auto;
            padding-top: 28px;
            border-top: 1px solid var(--line-soft);
        }

        .archive-summary strong {
            display: block;
            margin-bottom: 3px;
            font-family: "Noto Serif KR", serif;
            font-size: 1.8rem;
            font-weight: 400;
        }

        .archive-summary span {
            color: var(--muted);
            font-size: 0.7rem;
            letter-spacing: 0.04em;
        }

        .calendar-panel {
            display: flex;
            min-width: 0;
            flex-direction: column;
            padding: 34px clamp(28px, 4vw, 58px) 26px;
            background: var(--surface-strong);
        }

        .calendar-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 34px;
        }

        .calendar-heading {
            min-width: 0;
        }

        .calendar-heading h2 {
            margin: 0 0 5px;
            font-family: "Noto Serif KR", serif;
            font-size: clamp(1.65rem, 3vw, 2.3rem);
            font-weight: 500;
            letter-spacing: -0.04em;
        }

        .calendar-heading p {
            margin: 0;
            color: var(--muted);
            font-size: 0.73rem;
        }

        .calendar-controls {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .calendar-controls button {
            display: grid;
            width: 40px;
            height: 40px;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: background-color 180ms ease, border-color 180ms ease;
        }

        .calendar-controls button:hover {
            border-color: var(--text);
            background: var(--hover);
        }

        .calendar-controls svg {
            width: 17px;
            height: 17px;
        }

        .weekdays,
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
        }

        .weekdays {
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-align: center;
            text-transform: uppercase;
        }

        .weekdays span {
            padding: 8px 0;
        }

        .calendar-grid {
            flex: 1;
            grid-template-rows: repeat(6, minmax(74px, 1fr));
            border-top: 1px solid var(--line-soft);
            border-left: 1px solid var(--line-soft);
        }

        .date-cell {
            position: relative;
            display: grid;
            min-width: 0;
            place-items: center;
            border-right: 1px solid var(--line-soft);
            border-bottom: 1px solid var(--line-soft);
        }

        .date-cell.is-outside {
            color: var(--faint);
        }

        .date-button,
        .date-number {
            display: grid;
            width: clamp(38px, 4vw, 48px);
            height: clamp(38px, 4vw, 48px);
            place-items: center;
            border-radius: 50%;
            font-size: 0.78rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .date-button {
            position: relative;
            border: 1px solid var(--inverse);
            background: var(--inverse);
            color: var(--inverse-text);
            cursor: pointer;
            box-shadow: 0 8px 22px color-mix(in srgb, var(--text) 16%, transparent);
            transition: transform 220ms var(--ease), box-shadow 220ms ease;
        }

        .date-button::after {
            position: absolute;
            right: -4px;
            bottom: -4px;
            width: 8px;
            height: 8px;
            border: 3px solid var(--surface-strong);
            border-radius: 50%;
            background: var(--inverse);
            content: "";
        }

        .date-button.is-evidence {
            box-shadow:
                0 0 0 4px var(--surface-strong),
                0 0 0 5px var(--inverse),
                0 12px 28px color-mix(in srgb, var(--text) 24%, transparent);
        }

        .date-button.is-evidence::after {
            display: grid;
            right: -8px;
            bottom: -8px;
            width: 18px;
            height: 18px;
            place-items: center;
            border-width: 3px;
            color: var(--inverse-text);
            content: "↗";
            font-size: 0.54rem;
            font-weight: 600;
            line-height: 1;
        }

        .date-button:hover {
            box-shadow: 0 12px 28px color-mix(in srgb, var(--text) 25%, transparent);
            transform: translateY(-3px) scale(1.04);
        }

        .date-button.is-evidence:hover {
            box-shadow:
                0 0 0 4px var(--surface-strong),
                0 0 0 5px var(--inverse),
                0 16px 34px color-mix(in srgb, var(--text) 30%, transparent);
        }

        .date-cell.is-today .date-number {
            outline: 1px solid var(--line);
            outline-offset: 3px;
        }

        .entry-caption {
            position: absolute;
            right: 4px;
            bottom: 4px;
            left: 4px;
            overflow: hidden;
            color: var(--muted);
            font-size: 0.54rem;
            letter-spacing: 0.03em;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .calendar-legend {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 24px;
            margin: 20px 0 0;
            color: var(--muted);
            font-size: 0.7rem;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 9px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--inverse);
        }

        .legend-dot.is-evidence {
            box-shadow:
                0 0 0 2px var(--surface-strong),
                0 0 0 3px var(--inverse);
        }

        .empty-state {
            display: none;
            margin: auto;
            color: var(--muted);
            font-family: "Noto Serif KR", serif;
        }

        .site-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 34px 4px 0;
            color: var(--muted);
            font-size: 0.68rem;
            letter-spacing: 0.05em;
        }

        .site-footer a {
            color: inherit;
            text-underline-offset: 4px;
        }

        .diary-dialog {
            width: min(760px, calc(100vw - 40px));
            max-height: min(88vh, 920px);
            margin: auto;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 26px;
            padding: 0;
            background: var(--surface-strong);
            color: var(--text);
            box-shadow: var(--shadow);
        }

        .diary-dialog::backdrop {
            background: var(--overlay);
            backdrop-filter: blur(10px);
        }

        .diary-dialog[open] {
            animation: dialogIn 360ms var(--ease);
        }

        @keyframes dialogIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }
        }

        .dialog-frame {
            display: flex;
            max-height: min(88vh, 920px);
            flex-direction: column;
        }

        .dialog-topbar {
            display: flex;
            flex: 0 0 auto;
            align-items: center;
            justify-content: space-between;
            min-height: 70px;
            border-bottom: 1px solid var(--line-soft);
            padding: 0 22px 0 28px;
        }

        .diary-dialog.has-evidence .dialog-topbar {
            background:
                linear-gradient(90deg, color-mix(in srgb, var(--text) 7%, transparent), transparent 58%);
        }

        .dialog-context {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            color: var(--muted);
            font-size: 0.66rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .diary-dialog.has-evidence .dialog-context::before {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--inverse);
            box-shadow:
                0 0 0 2px var(--surface-strong),
                0 0 0 3px var(--inverse);
            content: "";
        }

        .dialog-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dialog-actions button {
            display: grid;
            width: 38px;
            height: 38px;
            place-items: center;
            border: 0;
            border-radius: 50%;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: background-color 180ms ease, opacity 180ms ease;
        }

        .dialog-actions button:hover:not(:disabled) {
            background: var(--hover);
        }

        .dialog-actions button:disabled {
            cursor: default;
            opacity: 0.24;
        }

        .dialog-actions svg {
            width: 17px;
            height: 17px;
        }

        .dialog-scroll {
            overflow-x: hidden;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: clamp(38px, 7vw, 68px) clamp(26px, 8vw, 78px) 72px;
        }

        .diary-heading {
            padding-bottom: 34px;
            border-bottom: 1px solid var(--line-soft);
        }

        .diary-heading h2 {
            margin: 0 0 11px;
            font-family: "Noto Serif KR", serif;
            font-size: clamp(2rem, 6vw, 3.7rem);
            font-weight: 400;
            letter-spacing: -0.055em;
            line-height: 1.15;
        }

        .diary-heading p {
            margin: 0;
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .diary-evidence {
            margin-top: 20px;
        }

        .diary-evidence a {
            display: inline-flex;
            max-width: 100%;
            align-items: center;
            gap: 9px;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 13px;
            color: var(--text);
            font-size: 0.68rem;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 180ms ease, border-color 180ms ease;
        }

        .diary-evidence a:hover {
            border-color: var(--text);
            background: var(--hover);
        }

        .evidence-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .evidence-arrow {
            flex: 0 0 auto;
            color: var(--muted);
        }

        .diary-content {
            padding-top: 36px;
            font-family: "Noto Serif KR", serif;
            font-size: clamp(0.96rem, 2vw, 1.04rem);
            font-weight: 400;
            letter-spacing: -0.015em;
            line-height: 2;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        .diary-content > :first-child {
            margin-top: 0;
        }

        .diary-content > :last-child {
            margin-bottom: 0;
        }

        .diary-content p {
            margin: 0 0 1.65em;
        }

        .diary-content h1,
        .diary-content h2,
        .diary-content h3 {
            margin: 2.1em 0 0.8em;
            font-weight: 600;
            line-height: 1.5;
        }

        .diary-content h1 {
            font-size: 1.55rem;
        }

        .diary-content h2 {
            font-size: 1.3rem;
        }

        .diary-content h3 {
            font-size: 1.1rem;
        }

        .diary-content blockquote {
            margin: 2em 0;
            border-left: 2px solid var(--text);
            padding: 0.15em 0 0.15em 1.4em;
            color: var(--muted);
        }

        .diary-content ul,
        .diary-content ol {
            margin: 0 0 1.65em;
            padding-left: 1.4em;
        }

        .diary-content li {
            margin-bottom: 0.4em;
        }

        .diary-content img {
            display: block;
            width: auto;
            max-width: 100%;
            height: auto;
            margin: 2em auto;
            border-radius: 14px;
        }

        .diary-content hr {
            width: 60px;
            height: 1px;
            margin: 3.2em auto;
            border: 0;
            background: var(--line);
        }

        .diary-content a {
            color: var(--text);
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
        }

        .diary-content code {
            border-radius: 5px;
            padding: 0.18em 0.4em;
            background: var(--hover);
            font-family: Consolas, monospace;
            font-size: 0.88em;
        }

        .diary-content pre {
            overflow-x: auto;
            border: 1px solid var(--line-soft);
            border-radius: 12px;
            padding: 18px;
            background: var(--surface);
            line-height: 1.65;
        }

        .diary-content pre code {
            padding: 0;
            background: transparent;
        }

        .dialog-status {
            display: grid;
            min-height: 260px;
            place-items: center;
            color: var(--muted);
            font-family: "Noto Serif KR", serif;
            font-size: 0.9rem;
        }

        .loading-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin-right: 9px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            50% {
                opacity: 0.3;
                transform: scale(0.72);
            }
        }

        @media (max-width: 900px) {
            .intro {
                grid-template-columns: 1fr;
            }

            .intro-copy {
                margin: 0;
            }

            .calendar-layout {
                grid-template-columns: 1fr;
            }

            .archive-nav {
                display: block;
                padding: 24px 26px 20px;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .archive-nav .section-label {
                display: none;
            }

            .year-list {
                margin-bottom: 14px;
            }

            .month-list {
                display: flex;
                overflow-x: auto;
                gap: 4px;
                padding-bottom: 4px;
                scrollbar-width: none;
            }

            .month-list::-webkit-scrollbar {
                display: none;
            }

            .month-button {
                flex: 0 0 auto;
                gap: 8px;
            }

            .archive-summary {
                display: none;
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: 100%;
                padding: max(14px, env(safe-area-inset-top)) 0 28px;
            }

            .site-header {

    <dialog class="diary-dialog" id="diaryDialog" aria-label="일기 내용">

                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>

                    <button id="closeDialog" type="button" aria-label="일기 닫기">

    <script>
        const diaryFiles = [...new Set(
            (typeof DIARY_FILES !== 'undefined' ? DIARY_FILES : [])
                .filter((file) => /^\d{6}$/.test(file) && parseDiaryDate(file))
        )].sort();

        const entrySet = new Set(diaryFiles);
        const evidenceEntries = new Set();
        const diaryCache = new Map();
        const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        const today = new Date();
        const latestDate = diaryFiles.length ? parseDiaryDate(diaryFiles.at(-1)) : today;

        let viewYear = latestDate.getFullYear();
        let viewMonth = latestDate.getMonth();
        let activeEntry = '';
        let requestSequence = 0;
        let suppressCalendarClick = false;
        let calendarTouchStart = null;

        const yearList = document.getElementById('yearList');
        const monthList = document.getElementById('monthList');
        const totalEntries = document.getElementById('totalEntries');
        const calendarTitle = document.getElementById('calendarTitle');
        const monthSummary = document.getElementById('monthSummary');
        const calendarGrid = document.getElementById('calendarGrid');
        const previousMonth = document.getElementById('previousMonth');
        const nextMonth = document.getElementById('nextMonth');
        const themeButton = document.getElementById('themeButton');
        const diaryDialog = document.getElementById('diaryDialog');
        const dialogContext = document.getElementById('dialogContext');
        const dialogScroll = document.getElementById('dialogScroll');
        const previousEntry = document.getElementById('previousEntry');
        const nextEntry = document.getElementById('nextEntry');
        const closeDialog = document.getElementById('closeDialog');
        const themeColor = document.querySelector('meta[name="theme-color"]');

        function parseDiaryDate(filename) {
            if (!/^\d{6}$/.test(String(filename))) return null;

            const year = 2000 + Number(filename.slice(0, 2));
            const month = Number(filename.slice(2, 4)) - 1;
            const day = Number(filename.slice(4, 6));
            const date = new Date(year, month, day);

            if (
                date.getFullYear() !== year ||
                date.getMonth() !== month ||
                date.getDate() !== day
            ) return null;

            return date;
        }

        function toFilename(date) {
            const year = String(date.getFullYear()).slice(-2);
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}${month}${day}`;
        }

        function countEntries(year, month = null) {
            return diaryFiles.filter((file) => {
                const date = parseDiaryDate(file);
                return date.getFullYear() === year && (month === null || date.getMonth() === month);
            }).length;
        }

        function setView(year, month) {
            viewYear = year;
            viewMonth = month;
            renderArchiveNavigation();
            renderCalendar();
        }

        function moveMonth(amount) {
            const target = new Date(viewYear, viewMonth + amount, 1);
            setView(target.getFullYear(), target.getMonth());
        }

        function centerScrollableItem(container, item) {
            if (!item || container.scrollWidth <= container.clientWidth) return;

            const containerRect = container.getBoundingClientRect();
            const itemRect = item.getBoundingClientRect();
            const left = container.scrollLeft
                + itemRect.left
                - containerRect.left
                - ((containerRect.width - itemRect.width) / 2);

            container.scrollTo({ left, behavior: 'smooth' });
        }

        function renderArchiveNavigation() {
            const availableYears = [...new Set(diaryFiles.map((file) => parseDiaryDate(file).getFullYear()))]
                .sort((a, b) => b - a);

            if (!availableYears.includes(viewYear)) {
                availableYears.push(viewYear);
                availableYears.sort((a, b) => b - a);
            }

            yearList.replaceChildren(...availableYears.map((year) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = `year-button${year === viewYear ? ' is-active' : ''}`;
                button.textContent = year;
                button.setAttribute('aria-pressed', String(year === viewYear));
                button.addEventListener('click', () => setView(year, viewMonth));
                return button;
            }));

            const activeYearButton = yearList.querySelector('.is-active');
            if (activeYearButton) {
                requestAnimationFrame(() => centerScrollableItem(yearList, activeYearButton));
            }

            monthList.replaceChildren(...monthNames.map((name, month) => {
                const count = countEntries(viewYear, month);
                const button = document.createElement('button');
                button.type = 'button';
                button.className = `month-button${month === viewMonth ? ' is-active' : ''}`;
                button.setAttribute('aria-pressed', String(month === viewMonth));
                button.setAttribute('aria-label', `${viewYear}년 ${month + 1}월${count ? `, 기록 ${count}개` : ''}`);
                button.innerHTML = `<span>${name}</span><span class="month-count">${count || ''}</span>`;
                button.addEventListener('click', () => setView(viewYear, month));
                return button;
            }));

            const activeMonthButton = monthList.querySelector('.is-active');
            if (activeMonthButton) {
                requestAnimationFrame(() => centerScrollableItem(monthList, activeMonthButton));
            }
        }

        function renderCalendar() {
            const entriesThisMonth = countEntries(viewYear, viewMonth);
            const firstDate = new Date(viewYear, viewMonth, 1);
            const mondayOffset = (firstDate.getDay() + 6) % 7;
            const gridStart = new Date(viewYear, viewMonth, 1 - mondayOffset);

            calendarTitle.textContent = `${viewYear}년 ${viewMonth + 1}월`;
            monthSummary.textContent = entriesThisMonth
                ? `${entriesThisMonth}개의 기록이 이 달에 머물러 있습니다`
                : '아직 이 달에 머문 기록이 없습니다';
            totalEntries.textContent = diaryFiles.length;
            calendarGrid.setAttribute('aria-label', `${viewYear}년 ${viewMonth + 1}월 달력`);

            const cells = Array.from({ length: 42 }, (_, index) => {
                const date = new Date(gridStart);
                date.setDate(gridStart.getDate() + index);

                const filename = toFilename(date);
                const hasEntry = entrySet.has(filename);
                const hasEvidence = evidenceEntries.has(filename);
                const isOutside = date.getMonth() !== viewMonth;
                const isToday = (
                    date.getFullYear() === today.getFullYear() &&
                    date.getMonth() === today.getMonth() &&
                    date.getDate() === today.getDate()
                );
                const cell = document.createElement('div');
                cell.className = [
                    'date-cell',
                    isOutside ? 'is-outside' : '',
                    isToday ? 'is-today' : ''
                ].filter(Boolean).join(' ');
                cell.setAttribute('role', 'gridcell');

                if (hasEntry) {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = `date-button${hasEvidence ? ' is-evidence' : ''}`;
                    button.textContent = date.getDate();
                    button.setAttribute(
                        'aria-label',
                        `${formatDate(date)}, ${hasEvidence ? '참고 링크가 있는 ' : ''}기록 열기`
                    );
                    button.addEventListener('click', () => {
                        if (!suppressCalendarClick) openDiary(filename);
                    });
                    cell.append(button);

                    if (!isOutside) {
                        const caption = document.createElement('span');
                        caption.className = 'entry-caption';
                        caption.textContent = hasEvidence ? 'reference' : 'written';
                        cell.append(caption);
                    }
                } else {
                    const number = document.createElement('span');
                    number.className = 'date-number';
                    number.textContent = date.getDate();
                    number.setAttribute('aria-hidden', 'true');
                    cell.append(number);
                }

                return cell;
            });

            calendarGrid.replaceChildren(...cells);
        }

        function formatDate(date, options = {}) {
            return date.toLocaleDateString('ko-KR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: options.weekday === false ? undefined : 'long'
            });
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (character) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            })[character]);
        }

        function normalizeLink(rawHref) {
            const href = rawHref.trim();
            if (!href) return '';
            if (/^(https?:\/\/|mailto:)/i.test(href)) return href;
            if (/^www\./i.test(href)) return `https://${href}`;
            if (/^[a-z0-9.-]+\.[a-z]{2,}([/?#].*)?$/i.test(href)) return `https://${href}`;
            if (/^(\/|\.\/|\.\.\/|#)/.test(href)) return href;
            return '';
        }

        function getLinkLabel(href, label, rawHref) {
            if (label && label !== href && label !== rawHref) return label;

            try {
                return new URL(href).hostname.replace(/^www\./, '') || label || 'Related link';
            } catch {
                return label || rawHref || 'Related link';
            }
        }

        function extractEvidence(markdown) {
            const cleanMarkdown = markdown.replace(/^\uFEFF/, '');
            const lines = cleanMarkdown.split(/\r?\n/);
            const firstLine = (lines[0] || '').trim();
            const markdownLink = firstLine.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
            const bracketLink = firstLine.match(/^\[([^\]]+)\]$/);

            if (!markdownLink && !bracketLink) {
                return { evidence: null, markdown: cleanMarkdown };
            }

            const label = markdownLink ? markdownLink[1].trim() : '';
            const rawHref = markdownLink ? markdownLink[2].trim() : bracketLink[1].trim();
            const href = normalizeLink(rawHref);

            if (!href) {
                return { evidence: null, markdown: cleanMarkdown };
            }

            return {
                evidence: {
                    href,
                    label: getLinkLabel(href, label, rawHref)
                },
                markdown: lines.slice(1).join('\n')
            };
        }

        function renderEvidence(evidence) {
            if (!evidence) return '';

            return `
                <div class="diary-evidence">
                    <a href="${escapeHtml(evidence.href)}" target="_blank" rel="noopener noreferrer">
                        <span>REFERENCE</span>
                        <span class="evidence-label">${escapeHtml(evidence.label)}</span>
                        <span class="evidence-arrow" aria-hidden="true">↗</span>
                    </a>
                </div>
            `;
        }

        async function getDiary(filename) {
            if (diaryCache.has(filename)) return diaryCache.get(filename);

            const response = await fetch(`./daily/${filename}.md`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const markdown = await response.text();
            const diary = extractEvidence(markdown);
            diaryCache.set(filename, diary);
            return diary;
        }

        async function discoverEvidenceEntries() {
            const discoveries = await Promise.all(diaryFiles.map(async (filename) => {
                try {
                    const diary = await getDiary(filename);
                    return diary.evidence ? filename : null;
                } catch {
                    return null;
                }
            }));

            discoveries.filter(Boolean).forEach((filename) => evidenceEntries.add(filename));
            renderCalendar();
        }

        async function openDiary(filename) {
            if (!entrySet.has(filename)) return;

            activeEntry = filename;
            const knownEvidence = evidenceEntries.has(filename);
            diaryDialog.classList.toggle('has-evidence', knownEvidence);
            dialogContext.textContent = knownEvidence ? 'Reference note' : 'Daily note';
            updateEntryNavigation();
            renderDialogLoading();

            if (!diaryDialog.open) {
                diaryDialog.showModal();
                document.body.classList.add('dialog-open');
            }

            const date = parseDiaryDate(filename);
            setView(date.getFullYear(), date.getMonth());
            const thisRequest = ++requestSequence;

            try {
                const diary = await getDiary(filename);
                if (thisRequest !== requestSequence || activeEntry !== filename) return;

                if (diary.evidence) evidenceEntries.add(filename);
                diaryDialog.classList.toggle('has-evidence', Boolean(diary.evidence));
                dialogContext.textContent = diary.evidence ? 'Reference note' : 'Daily note';

                const html = typeof marked !== 'undefined'
                    ? marked.parse(diary.markdown)
                    : `<p>${escapeHtml(diary.markdown).replace(/\n/g, '<br>')}</p>`;

                dialogScroll.innerHTML = `
                    <article>
                        <header class="diary-heading">
                            <h2 id="diaryTitle">${date.getDate()}일의 기록</h2>
                            <p>${escapeHtml(formatDate(date))}</p>
                            ${renderEvidence(diary.evidence)}
                        </header>
                        <div class="diary-content">${html}</div>
                    </article>
                `;
                dialogScroll.scrollTop = 0;
            } catch {
                if (thisRequest !== requestSequence) return;
                dialogScroll.innerHTML = `
                    <div class="dialog-status">
                        <span>기록을 불러오지 못했습니다.<br>daily/${escapeHtml(filename)}.md 파일을 확인해주세요.</span>
                    </div>
                `;
            }
        }

        function renderDialogLoading() {
            dialogScroll.innerHTML = `
                <div class="dialog-status">
                    <span><span class="loading-dot"></span>기록을 펼치는 중입니다</span>
                </div>
            `;
        }

        function updateEntryNavigation() {
            const index = diaryFiles.indexOf(activeEntry);
            previousEntry.disabled = index <= 0;
            nextEntry.disabled = index < 0 || index >= diaryFiles.length - 1;
        }

        function closeDiary() {
            requestSequence++;
            diaryDialog.close();
            document.body.classList.remove('dialog-open');
            activeEntry = '';
        }

        function updateThemeButton() {
            const isDark = document.documentElement.dataset.theme === 'dark';
            themeButton.setAttribute('aria-label', isDark ? '라이트 모드로 전환' : '다크 모드로 전환');
            themeColor.setAttribute('content', isDark ? '#0f0f0e' : '#f4f3ef');
        }

        previousMonth.addEventListener('click', () => moveMonth(-1));
        nextMonth.addEventListener('click', () => moveMonth(1));

        themeButton.addEventListener('click', () => {
            const nextTheme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = nextTheme;
            localStorage.setItem('thoughts-theme', nextTheme);
            updateThemeButton();
        });

        previousEntry.addEventListener('click', () => {
            const index = diaryFiles.indexOf(activeEntry);
            if (index > 0) openDiary(diaryFiles[index - 1]);
        });

        nextEntry.addEventListener('click', () => {
            const index = diaryFiles.indexOf(activeEntry);
            if (index >= 0 && index < diaryFiles.length - 1) openDiary(diaryFiles[index + 1]);
        });

        closeDialog.addEventListener('click', closeDiary);

        diaryDialog.addEventListener('click', (event) => {
            if (event.target === diaryDialog) closeDiary();
        });

        diaryDialog.addEventListener('cancel', (event) => {
            event.preventDefault();
            closeDiary();
        });

        calendarGrid.addEventListener('touchstart', (event) => {
            if (!window.matchMedia('(max-width: 640px)').matches || event.touches.length !== 1) return;

            calendarTouchStart = {
                x: event.touches[0].clientX,
                y: event.touches[0].clientY
            };
        }, { passive: true });

        calendarGrid.addEventListener('touchend', (event) => {
            if (!calendarTouchStart || !window.matchMedia('(max-width: 640px)').matches) return;

            const touch = event.changedTouches[0];
            const distanceX = touch.clientX - calendarTouchStart.x;
            const distanceY = touch.clientY - calendarTouchStart.y;
            calendarTouchStart = null;

            if (Math.abs(distanceX) < 48 || Math.abs(distanceX) <= Math.abs(distanceY) * 1.25) return;

            event.preventDefault();
            suppressCalendarClick = true;
            moveMonth(distanceX < 0 ? 1 : -1);
            window.setTimeout(() => {
                suppressCalendarClick = false;
            }, 250);
        }, { passive: false });

        calendarGrid.addEventListener('touchcancel', () => {
            calendarTouchStart = null;
        }, { passive: true });

        renderArchiveNavigation();
        renderCalendar();
        updateThemeButton();
        discoverEvidenceEntries();
    </script>
</body>
</html>
