<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f7f8fb">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23222222'/%3E%3Cpath d='M32 68V32h10l8 14 8-14h10v36h-8V46l-10 16-10-16v22z' fill='%23fcfbf9'/%3E%3Ccircle cx='70' cy='32' r='4' fill='%23888888'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23222222'/%3E%3Cpath d='M32 68V32h10l8 14 8-14h10v36h-8V46l-10 16-10-16v22z' fill='%23fcfbf9'/%3E%3Ccircle cx='70' cy='32' r='4' fill='%23888888'/%3E%3C/svg%3E">
    <title>Monolog (rexondex)</title>

    <script src="./daily.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            color-scheme: dark;
            --page-bg: #101114;
            --surface: #191b20;
            --surface-strong: #22262d;
            --surface-soft: rgba(255, 255, 255, 0.055);
            --header-bg: rgba(25, 27, 32, 0.82);
            --text-main: #f4f6fa;
            --text-body: #d8dde6;
            --text-sub: #a2abb9;
            --text-faint: #737d8c;
            --border-color: rgba(255, 255, 255, 0.11);
            --accent: #78c8bd;
            --accent-strong: #9bded1;
            --accent-warm: #ef8b6d;
            --code-bg: rgba(120, 200, 189, 0.12);
            --quote-bg: rgba(255, 255, 255, 0.05);
            --grid-line: rgba(255, 255, 255, 0.035);
            --shadow-color: rgba(0, 0, 0, 0.32);
            --ring: rgba(120, 200, 189, 0.3);
            --transition-speed: 260ms;
        }

        body.light-mode {
            color-scheme: light;
            --page-bg: #f7f8fb;
            --surface: #ffffff;
            --surface-strong: #f0f3f8;
            --surface-soft: rgba(45, 125, 121, 0.07);
            --header-bg: rgba(255, 255, 255, 0.84);
            --text-main: #17202a;
            --text-body: #2f3b49;
            --text-sub: #657184;
            --text-faint: #8a94a4;
            --border-color: #dfe5ee;
            --accent: #2d7d79;
            --accent-strong: #166a69;
            --accent-warm: #c95740;
            --code-bg: #eef6f4;
            --quote-bg: #f2f6f8;
            --grid-line: rgba(45, 73, 94, 0.045);
            --shadow-color: rgba(31, 45, 61, 0.09);
            --ring: rgba(45, 125, 121, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            background: var(--page-bg);
            color: var(--text-main);
            font-family: 'Inter', 'Noto Sans KR', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.75;
            letter-spacing: 0;
            word-break: keep-all;
            overflow-wrap: anywhere;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(120, 200, 189, 0.08), transparent 360px),
                linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.035), transparent),
                repeating-linear-gradient(0deg, transparent 0 47px, var(--grid-line) 48px),
                repeating-linear-gradient(90deg, transparent 0 47px, var(--grid-line) 48px);
        }

        body.light-mode::before {
            background:
                linear-gradient(180deg, rgba(45, 125, 121, 0.08), transparent 360px),
                linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.75), transparent),
                repeating-linear-gradient(0deg, transparent 0 47px, var(--grid-line) 48px),
                repeating-linear-gradient(90deg, transparent 0 47px, var(--grid-line) 48px);
        }

        ::selection {
            background: var(--accent);
            color: var(--page-bg);
        }

        .container {
            width: min(100%, 980px);
            margin: 0 auto;
            padding: 28px 24px 72px;
        }

        .site-header {
            position: sticky;
            top: 16px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            min-height: 68px;
            margin-bottom: 56px;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--header-bg);
            box-shadow: 0 18px 48px var(--shadow-color);
            backdrop-filter: blur(18px);
            transition:
                background-color var(--transition-speed),
                border-color var(--transition-speed),
                box-shadow var(--transition-speed);
        }

        @supports not (backdrop-filter: blur(1px)) {
            .site-header {
                background: var(--surface);
            }
        }

        .brand {
            display: inline-flex;
            align-items: center;
            min-width: 0;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            flex: 0 0 42px;
            width: 42px;
            height: 42px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background:
                linear-gradient(135deg, var(--accent), var(--accent-warm));
            color: #ffffff;
            font-weight: 700;
            line-height: 1;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.26);
        }

        .brand h1 {
            font-size: 1.18rem;
            font-weight: 700;
            line-height: 1.15;
        }

        .brand p {
            margin-top: 2px;
            color: var(--text-sub);
            font-size: 0.84rem;
            line-height: 1.35;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-link,
        #themeBtn {
            display: grid;
            place-items: center;
            width: 40px;
            height: 40px;
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-main);
            background: transparent;
            text-decoration: none;
            cursor: pointer;
            transition:
                transform 180ms ease,
                background-color var(--transition-speed),
                border-color var(--transition-speed),
                color var(--transition-speed);
        }

        .icon-link svg,
        #themeBtn svg {
            width: 19px;
            height: 19px;
        }

        .icon-link svg {
            fill: currentColor;
        }

        #themeBtn svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .icon-link:hover,
        #themeBtn:hover {
            border-color: var(--border-color);
            background: var(--surface-soft);
            color: var(--accent-strong);
            transform: translateY(-2px);
        }

        .sun-icon {
            display: none;
        }

        body:not(.light-mode) .sun-icon {
            display: block;
        }

        body:not(.light-mode) .moon-icon {
            display: none;
        }

        body.light-mode .moon-icon {
            display: block;
        }

        .journal-intro {
            display: grid;
            gap: 18px;
            margin-bottom: 38px;
            padding: 0 4px 28px;
            border-bottom: 1px solid var(--border-color);
        }

        .intro-kicker {
            color: var(--accent-strong);
            font-size: 0.84rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .journal-intro h2 {
            max-width: 720px;
            color: var(--text-main);
            font-size: 2.65rem;
            font-weight: 700;
            line-height: 1.18;
        }

        .intro-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
            color: var(--text-sub);
            font-size: 0.94rem;
        }

        .intro-meta span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .intro-meta span::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-warm);
        }

        .diary-stream {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .diary-card {
            position: relative;
            overflow: hidden;
            padding: 32px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: 0 22px 70px var(--shadow-color);
            opacity: 0;
            transform: translateY(18px) scale(0.992);
            animation: cardIn 680ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: var(--delay, 0ms);
            transition:
                transform var(--transition-speed) ease,
                border-color var(--transition-speed),
                box-shadow var(--transition-speed),
                background-color var(--transition-speed);
        }

        .diary-card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-warm));
            opacity: 0.9;
            transform: scaleX(0.22);
            transform-origin: left;
            transition: transform 420ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        .diary-card:hover {
            border-color: var(--ring);
            box-shadow: 0 26px 84px var(--shadow-color);
            transform: translateY(-3px);
        }

        .diary-card:hover::before {
            transform: scaleX(1);
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .diary-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border-color);
        }

        .diary-title-date {
            color: var(--accent-strong);
            font-size: 1.06rem;
            font-weight: 700;
            line-height: 1.25;
        }

        .diary-sub-date {
            margin-top: 4px;
            color: var(--text-sub);
            font-size: 0.86rem;
            line-height: 1.45;
        }

        .diary-anchor {
            flex: 0 0 auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 5px 9px;
            color: var(--text-sub);
            background: var(--surface-soft);
            font-size: 0.78rem;
            font-weight: 700;
            line-height: 1.2;
            text-decoration: none;
            transition:
                color var(--transition-speed),
                border-color var(--transition-speed),
                background-color var(--transition-speed),
                transform 180ms ease;
        }

        .diary-anchor:hover {
            color: var(--accent-strong);
            border-color: var(--ring);
            transform: translateY(-1px);
        }

        .diary-content {
            color: var(--text-body);
            font-family: 'Noto Serif KR', 'Noto Sans KR', serif;
            font-size: 1.06rem;
            font-weight: 400;
            line-height: 1.95;
        }

        .diary-content > *:first-child {
            margin-top: 0;
        }

        .diary-content > *:last-child {
            margin-bottom: 0;
        }

        .diary-content p {
            margin: 0 0 1.45em;
        }

        .diary-content h1,
        .diary-content h2,
        .diary-content h3,
        .diary-content h4 {
            margin: 2em 0 0.8em;
            color: var(--text-main);
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            font-weight: 700;
            line-height: 1.35;
        }

        .diary-content h1 {
            font-size: 1.62rem;
        }

        .diary-content h2 {
            font-size: 1.38rem;
        }

        .diary-content h3 {
            font-size: 1.18rem;
        }

        .diary-content strong {
            color: var(--text-main);
            font-weight: 700;
        }

        .diary-content em {
            color: var(--text-main);
            font-style: normal;
            background: linear-gradient(transparent 62%, rgba(120, 200, 189, 0.22) 0);
        }

        .diary-content blockquote {
            margin: 2em 0;
            padding: 18px 20px;
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            background: var(--quote-bg);
            color: var(--text-main);
            font-style: normal;
        }

        .diary-content ul,
        .diary-content ol {
            margin: 0 0 1.55em 1.35em;
            padding-left: 0.4em;
        }

        .diary-content li {
            margin-bottom: 0.62em;
            padding-left: 0.16em;
        }

        .diary-content li::marker {
            color: var(--accent);
            font-weight: 700;
        }

        .diary-content a {
            color: var(--accent-strong);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
            transition: color var(--transition-speed);
        }

        .diary-content a:hover {
            color: var(--accent-warm);
        }

        .diary-content code {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.12em 0.38em;
            background: var(--code-bg);
            color: var(--text-main);
            font-family: ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace;
            font-size: 0.9em;
        }

        .diary-content pre {
            margin: 1.8em 0;
            padding: 18px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--surface-strong);
            overflow-x: auto;
        }

        .diary-content pre code {
            border: 0;
            padding: 0;
            background: transparent;
        }

        .diary-content img {
            display: block;
            width: 100%;
            max-width: 100%;
            height: auto;
            margin: 2em 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 18px 42px var(--shadow-color);
        }

        .diary-content hr {
            width: min(180px, 45%);
            height: 1px;
            margin: 3em auto;
            border: 0;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
        }

        .diary-content table {
            width: 100%;
            margin: 1.8em 0;
            border-collapse: collapse;
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            font-size: 0.94rem;
        }

        .diary-content th,
        .diary-content td {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            text-align: left;
            vertical-align: top;
        }

        .diary-content th {
            background: var(--surface-soft);
            color: var(--text-main);
            font-weight: 700;
        }

        .diary-card--error {
            border-color: rgba(201, 87, 64, 0.45);
        }

        .diary-card--error .diary-title-date,
        .diary-card--error .diary-content {
            color: var(--accent-warm);
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 46px;
        }

        .btn {
            min-width: 88px;
            min-height: 42px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text-main);
            font: inherit;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 34px var(--shadow-color);
            transition:
                transform 180ms ease,
                background-color var(--transition-speed),
                border-color var(--transition-speed),
                color var(--transition-speed),
                opacity var(--transition-speed);
        }

        .btn:hover:not(:disabled) {
            border-color: var(--ring);
            background: var(--surface-soft);
            color: var(--accent-strong);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.42;
            cursor: not-allowed;
            box-shadow: none;
        }

        .page-info {
            min-width: 58px;
            color: var(--text-sub);
            font-size: 0.92rem;
            font-weight: 700;
            text-align: center;
        }

        .status-msg {
            display: grid;
            place-items: center;
            gap: 14px;
            min-height: 220px;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text-sub);
            font-size: 0.96rem;
            text-align: center;
        }

        .status-pulse {
            width: 72px;
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: pulseLine 1.2s ease-in-out infinite;
        }

        @keyframes pulseLine {
            0%, 100% {
                opacity: 0.4;
                transform: scaleX(0.7);
            }
            50% {
                opacity: 1;
                transform: scaleX(1.2);
            }
        }

        footer {
            margin-top: 70px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            color: var(--text-faint);
            font-size: 0.78rem;
            font-weight: 700;
            text-align: center;
        }

        @media screen and (max-width: 760px) {
            .container {
                padding: 18px 16px 54px;
            }

            .site-header {
                top: 8px;
                margin-bottom: 38px;
                padding: 10px;
            }

            .brand-mark {
                flex-basis: 38px;
                width: 38px;
                height: 38px;
            }

            .brand h1 {
                font-size: 1.08rem;
            }

            .brand p {
                font-size: 0.78rem;
            }

            .icon-link,
            #themeBtn {
                width: 38px;
                height: 38px;
            }

            .journal-intro {
                margin-bottom: 28px;
                padding-bottom: 24px;
            }

            .journal-intro h2 {
                font-size: 2.02rem;
                line-height: 1.22;
            }

            .intro-meta {
                font-size: 0.88rem;
            }

            .diary-stream {
                gap: 22px;
            }

            .diary-card {
                padding: 24px 20px;
            }

            .diary-header {
                flex-direction: column;
                gap: 12px;
                margin-bottom: 20px;
            }

            .diary-content {
                font-size: 0.99rem;
                line-height: 1.88;
            }

            .diary-content h1 {
                font-size: 1.42rem;
            }

            .diary-content h2 {
                font-size: 1.22rem;
            }

            .pagination {
                margin-top: 34px;
                gap: 10px;
            }
        }

        @media screen and (max-width: 480px) {
            .site-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .header-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .journal-intro h2 {
                font-size: 1.74rem;
            }

            .intro-meta {
                display: grid;
                gap: 8px;
            }

            .diary-card {
                padding: 22px 18px;
            }

            .pagination {
                flex-wrap: wrap;
            }

            .btn {
                flex: 1 1 96px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }

            .diary-card {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

                        <path d="M20.5 14.8A8.4 8.4 0 0 1 9.2 3.5a8.7 8.7 0 1 0 11.3 11.3Z"/>
                    </svg>
                    <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="4"/>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                    </svg>
                </button>
            </div>
        </header>

        <section class="journal-intro" aria-labelledby="journalTitle">
            <p class="intro-kicker">Rexondex Journal</p>
            <h2 id="journalTitle">생각과 작업의 작은 로그북</h2>
            <div class="intro-meta" aria-label="일기 정보">
                <span id="entryCount">기록 수 계산 중</span>
                <span id="latestDate">최근 기록 확인 중</span>
            </div>
        </section>

        <main class="diary-stream" id="diaryContainer" aria-live="polite">
            <div class="status-msg">
                <span class="status-pulse" aria-hidden="true"></span>
                <span>기록을 조심스럽게 꺼내는 중입니다...</span>
            </div>
        </main>

        <nav class="pagination" aria-label="일기 페이지">
            <button class="btn" id="prevBtn" type="button" disabled>이전</button>
            <span class="page-info" id="pageInfo">1 / 1</span>
            <button class="btn" id="nextBtn" type="button" disabled>다음</button>
        </nav>

        <footer>
            <p>&copy; 2026 MONOLOG. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <script>
        let currentPage = 1;
        let sortedFiles = [];

        const diaryContainer = document.getElementById('diaryContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageInfo = document.getElementById('pageInfo');
        const themeBtn = document.getElementById('themeBtn');
        const entryCount = document.getElementById('entryCount');
        const latestDate = document.getElementById('latestDate');
        const themeMeta = document.querySelector('meta[name="theme-color"]');

        if (window.marked) {
            marked.setOptions({
                breaks: true,
                gfm: true
            });
        }

        function escapeHtml(text) {
            const escapeTarget = document.createElement('div');
            escapeTarget.textContent = text;
            return escapeTarget.innerHTML;
        }

        function parseMarkdown(markdownText) {
            if (window.marked) {
                return marked.parse(markdownText);
            }

            return markdownText
                .trim()
                .split(/\n{2,}/)
                .map((block) => `<p>${escapeHtml(block).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function getDateFromFilename(filename) {
            if (filename.length !== 6) return null;

            const yy = parseInt(filename.substring(0, 2), 10);
            const mm = parseInt(filename.substring(2, 4), 10) - 1;
            const dd = parseInt(filename.substring(4, 6), 10);
            const dateObj = new Date(2000 + yy, mm, dd);

            return isNaN(dateObj.getTime()) ? null : dateObj;
        }

        function getDisplayDate(filename) {
            const dateObj = getDateFromFilename(filename);
            if (!dateObj) return filename;

            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}.${month}.${day}`;
        }

        function getSubDateText(filename) {
            const dateObj = getDateFromFilename(filename);
            if (!dateObj) return '';

            const dateStr = dateObj.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
            const dayStr = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
            return `${dateStr} &nbsp;&middot;&nbsp; ${dayStr}`;
        }

        function getStatusMarkup(message) {
            return `
                <div class="status-msg">
                    <span class="status-pulse" aria-hidden="true"></span>
                    <span>${message}</span>
                </div>
            `;
        }

        function updateIntroMeta() {
            const total = sortedFiles.length;
            const latest = sortedFiles[0] ? getDisplayDate(sortedFiles[0]) : '아직 기록 없음';

            entryCount.textContent = `${total}개의 기록`;
            latestDate.textContent = `최근 기록 ${latest}`;
        }

        async function fetchDiaryCard(filename, index = 0) {
            const displayDate = getDisplayDate(filename);

            try {
                const response = await fetch(`./daily/${filename}.md`);
                if (!response.ok) throw new Error('Diary fetch failed');

                const markdownText = await response.text();
                const htmlContent = parseMarkdown(markdownText);
                const subDate = getSubDateText(filename);

                return `
                    <article class="diary-card" style="--delay: ${index * 80}ms">
                        <header class="diary-header">
                            <div>
                                <h2 class="diary-title-date">${displayDate}</h2>
                                <p class="diary-sub-date">${subDate}</p>
                            </div>
                            <a class="diary-anchor" href="./daily/${filename}.md" aria-label="${displayDate} 원문 보기">MD</a>
                        </header>
                        <div class="diary-content">
                            ${htmlContent}
                        </div>
                    </article>
                `;
            } catch (err) {
                return `
                    <article class="diary-card diary-card--error" style="--delay: ${index * 80}ms">
                        <header class="diary-header">
                            <div>
                                <h2 class="diary-title-date">${displayDate}</h2>
                                <p class="diary-sub-date">파일을 불러올 수 없습니다.</p>
                            </div>
                        </header>
                        <div class="diary-content">
                            <p>daily/${filename}.md 경로를 확인해 주세요.</p>
                        </div>
                    </article>
                `;
            }
        }

        async function displayPage(page) {
            diaryContainer.innerHTML = getStatusMarkup('기록을 조심스럽게 꺼내는 중입니다...');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const totalPages = Math.ceil(sortedFiles.length / ITEMS_PER_PAGE) || 1;
            const startIndex = (page - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageFiles = sortedFiles.slice(startIndex, endIndex);

            if (pageFiles.length === 0) {
                diaryContainer.innerHTML = getStatusMarkup('아직 기록된 일기가 없습니다.');
                pageInfo.textContent = `0 / ${totalPages}`;
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }

            const cards = await Promise.all(
                pageFiles.map((file, index) => fetchDiaryCard(file, index))
            );
            diaryContainer.innerHTML = cards.join('');

            pageInfo.textContent = `${page} / ${totalPages}`;
            prevBtn.disabled = page === 1;
            nextBtn.disabled = page === totalPages;
        }

        function initDiary() {
            sortedFiles = [...DIARY_FILES].sort((a, b) => b.localeCompare(a));
            updateIntroMeta();
            displayPage(currentPage);
        }

        function syncThemeButton() {
            const isLight = document.body.classList.contains('light-mode');
            const nextMode = isLight ? '다크 모드로 전환' : '라이트 모드로 전환';

            themeBtn.title = nextMode;
            themeBtn.setAttribute('aria-label', nextMode);
            themeMeta.setAttribute('content', isLight ? '#f7f8fb' : '#101114');
        }

        function getSavedTheme() {
            try {
                return localStorage.getItem('monolog-theme');
            } catch (err) {
                return null;
            }
        }

        function saveTheme(theme) {
            try {
                localStorage.setItem('monolog-theme', theme);
            } catch (err) {
                // 저장이 막힌 환경에서는 현재 화면 테마만 유지합니다.
            }
        }

        function initTheme() {
            const savedTheme = getSavedTheme();
            const prefersDark = window.matchMedia &&
                window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.remove('light-mode');
            } else {
                document.body.classList.add('light-mode');
            }

            syncThemeButton();
        }

        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                displayPage(currentPage);
            }
        });

        nextBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(sortedFiles.length / ITEMS_PER_PAGE);
            if (currentPage < totalPages) {
                currentPage++;
                displayPage(currentPage);
            }
        });

        themeBtn.addEventListener('click', () => {
            const nextIsLight = !document.body.classList.contains('light-mode');
            document.body.classList.toggle('light-mode', nextIsLight);
            saveTheme(nextIsLight ? 'light' : 'dark');
            syncThemeButton();
        });

        initTheme();
        document.addEventListener('DOMContentLoaded', initDiary);
    </script>
</body>
</html>
