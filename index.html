<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 브라우저 탭 아이콘 (Favicon) -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <!-- 스마트폰 홈 화면 추가용 아이콘 (Apple Touch Icon) -->
    <link rel="apple-touch-icon" href="./favicon.svg">
    <title>Thoughts (rexondex)</title>

    <script src="./daily.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* [수정 1] 기본(:root)을 다크 모드(블랙) 컬러 팔레트로 설정 */
        :root {
            --bg-color: #171717;      /* 눈이 편안한 차콜 블랙 배경 */
            --card-bg: #212121;       /* 짙은 그레이 카드 */
            --text-main: #ececec;     /* 세련된 웜 화이트 텍스트 */
            --text-sub: #999999;
            --border-color: #333333;
            --btn-bg-hover: #ececec;
            --btn-text-hover: #171717;
            --icon-bg-hover: #333333;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --badge-bg: rgba(255, 255, 255, 0.035);
            --badge-bg-hover: rgba(255, 255, 255, 0.075);
            --badge-border: rgba(255, 255, 255, 0.14);
            --transition-speed: 0.3s;
        }

        /* [수정 2] 버튼 누르면 적용될 .light-mode(화이트) 컬러 팔레트 */
        body.light-mode {
            --bg-color: #fcfbf9;      /* 아주 은은한 아이보리 웜 화이트 */
            --card-bg: #ffffff;       /* 순백색 카드 */
            --text-main: #222222;     /* 고급스러운 먹색 텍스트 */
            --text-sub: #888888;
            --border-color: #f0eee9;
            --btn-bg-hover: #222222;
            --btn-text-hover: #ffffff;
            --icon-bg-hover: #f0eee9;
            --shadow-color: rgba(0, 0, 0, 0.03);
            --badge-bg: rgba(0, 0, 0, 0.025);
            --badge-bg-hover: rgba(0, 0, 0, 0.055);
            --badge-border: rgba(0, 0, 0, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', 'Noto Serif KR', serif;
            line-height: 1.75;
            letter-spacing: 0;
            word-break: keep-all;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        header {
            margin-bottom: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 24px;
            transition: border-color var(--transition-speed);
        }

        .brand h1 {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            font-family: 'Inter', sans-serif;
            margin-bottom: 4px;
        }

        .brand p {
            font-size: 0.85rem;
            color: var(--text-sub);
            font-weight: 300;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: var(--text-main);
            text-decoration: none;
            transition: background-color var(--transition-speed), color var(--transition-speed), transform 0.2s;
        }

        .icon-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .icon-link:hover {
            background-color: var(--icon-bg-hover);
            transform: translateY(-2px);
        }

        #themeBtn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color var(--transition-speed), transform 0.2s;
        }
        
        #themeBtn:hover {
            background-color: var(--icon-bg-hover);
            transform: translateY(-2px);
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color var(--transition-speed), border-color var(--transition-speed), color var(--transition-speed);
            font-family: 'Inter', sans-serif;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--btn-bg-hover);
            color: var(--btn-text-hover);
            border-color: var(--text-main);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .diary-stream {
            display: flex;
            flex-direction: column;
            gap: 72px;
        }

        .diary-card {
            position: relative;
            background: transparent;
            border: 0;
            border-radius: 0;
            padding: 0 0 0 30px;
            margin: 0;
            box-shadow: none;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: opacity var(--transition-speed);
        }

        .diary-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.35rem;
            width: 2px;
            height: 72px;
            border-radius: 999px;
            background: linear-gradient(to bottom, var(--text-main), transparent);
            opacity: 0.28;
        }

        .diary-card::after {
            content: "";
            position: absolute;
            left: -3px;
            top: 0.35rem;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-main);
            opacity: 0.4;
        }

        .diary-card:hover {
            transform: translateY(0);
            box-shadow: none;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .diary-header {
            margin-bottom: 28px;
        }

        .diary-title-date {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin-bottom: 4px;
        }

        .diary-sub-date {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .diary-evidence {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        .diary-link-badge {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            min-height: 30px;
            max-width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--badge-border);
            border-radius: 4px;
            background: var(--badge-bg);
            color: var(--text-main);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.76rem;
            font-weight: 600;
            line-height: 1;
            box-shadow: none;
            transition: background-color var(--transition-speed), border-color var(--transition-speed), color var(--transition-speed);
        }

        .diary-link-badge:hover {
            border-color: var(--text-main);
            background: var(--badge-bg-hover);
        }

        .badge-kicker {
            color: var(--text-sub);
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .badge-label {
            max-width: min(46vw, 320px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .diary-content {
            font-size: 1rem;
            color: var(--text-main);
            font-weight: 400;
            opacity: 0.9;
        }

        .diary-content p { margin-bottom: 1.6em; }
        .diary-content p:last-child { margin-bottom: 0; }
        
        .diary-content h1, .diary-content h2, .diary-content h3 { 
            margin: 1.8em 0 0.8em 0; 
            color: var(--text-main); 
            font-weight: 600;
        }
        .diary-content h1 { font-size: 1.4rem; }
        .diary-content h2 { font-size: 1.2rem; }
        
        .diary-content blockquote {
            border-left: 3px solid var(--text-main);
            padding-left: 16px;
            color: var(--text-sub);
            margin: 1.8em 0;
            font-style: italic;
        }

        .diary-content ul, .diary-content ol {
            margin-left: 20px;
            margin-bottom: 1.6em;
        }
        .diary-content li { margin-bottom: 0.5em; }

        .diary-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5em 0;
            display: block;
        }

        .diary-content hr {
            border: 0;
            width: 96px;
            height: 1px;
            background: var(--border-color);
            margin: 2.8em auto;
            opacity: 0.85;
        }

        .diary-content a { color: var(--text-main); text-decoration: underline; text-underline-offset: 3px; }
        .diary-content code { 
            background: rgba(150, 150, 150, 0.1); 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-family: monospace; 
            font-size: 0.9em;
        }

        .pagination {
            margin-top: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }

        .page-info {
            font-size: 0.9rem;
            color: var(--text-sub);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }

        .status-msg {
            text-align: center;
            color: var(--text-sub);
            font-size: 0.95rem;
            padding: 60px 0;
        }

        footer {
            margin-top: 100px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-sub);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.05em;
        }

        @media screen and (max-width: 640px) {
            .container { padding: 36px 16px; }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
                margin-bottom: 40px;
                padding-bottom: 24px;
            }
            .brand h1 { font-size: 1.4rem; }
            .brand p { font-size: 0.75rem; }
            
            .diary-stream {
                gap: 56px;
            }

            .diary-card {
                padding: 0 0 0 20px;
            }

            .diary-card::before {
                height: 60px;
            }
            
            .diary-title-date { font-size: 1.3rem; }
            .diary-content { font-size: 0.95rem; }
            .diary-link-badge { font-size: 0.74rem; }
            .badge-label { max-width: 58vw; }
            
            .pagination { margin-top: 50px; gap: 16px; }
            .btn { padding: 8px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body class="light-mode">

    <div class="container">
        <header>
            <div class="brand">
                <h1>Thoughts</h1>
                <p>생각의 경로</p>
            </div>
            
            <div class="header-actions">
                <a href="https://x.com/rexon_dex" target="_blank" title="@rexon_dex" class="icon-link">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
                <a href="https://github.com/rexondex" target="_blank" title="rexondex" class="icon-link">
                    <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                </a>
                <button id="themeBtn" title="다크/라이트 모드 전환">🌓</button>
            </div>
        </header>

        <main class="diary-stream" id="diaryContainer">
            <div class="status-msg">기록을 조심스럽게 꺼내는 중입니다...</div>
        </main>

        <div class="pagination">
            <button class="btn" id="prevBtn" disabled>이전</button>
            <span class="page-info" id="pageInfo">1 / 1</span>
            <button class="btn" id="nextBtn" disabled>다음</button>
        </div>

        <footer>
            <p>&copy; 2026 Thoughts. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <script>
        let currentPage = 1;
        let sortedFiles = [];

        const diaryContainer = document.getElementById('diaryContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageInfo = document.getElementById('pageInfo');
        const themeBtn = document.getElementById('themeBtn');

        function getSubDateText(filename) {
            if (filename.length !== 6) return '';
            const yy = parseInt(filename.substring(0, 2), 10);
            const mm = parseInt(filename.substring(2, 4), 10) - 1;
            const dd = parseInt(filename.substring(4, 6), 10);
            const dateObj = new Date(2000 + yy, mm, dd);
            
            if (isNaN(dateObj.getTime())) return '';
            
            const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const dayStr = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
            return `${dateStr} &nbsp;&middot;&nbsp; ${dayStr}`;
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function normalizeBadgeHref(rawHref) {
            const href = rawHref.trim();
            if (!href) return '';
            if (/^(https?:\/\/|mailto:)/i.test(href)) return href;
            if (/^www\./i.test(href)) return `https://${href}`;
            if (/^[a-z0-9.-]+\.[a-z]{2,}([/?#].*)?$/i.test(href)) return `https://${href}`;
            if (/^(\/|\.\/|\.\.\/|#)/.test(href)) return href;
            return '';
        }

        function getBadgeLabel(href, labelText, rawHref) {
            const label = labelText.trim();
            if (label && label !== href && label !== rawHref) return label;

            try {
                const url = new URL(href);
                return url.hostname.replace(/^www\./, '') || label || 'Evidence';
            } catch (err) {
                return label || rawHref || 'Evidence';
            }
        }

        function extractEvidenceLink(markdownText) {
            const cleanText = markdownText.replace(/^\uFEFF/, '');
            const lines = cleanText.split(/\r?\n/);
            const firstLine = lines[0] || '';

            if (!firstLine.startsWith('[')) {
                return { badge: null, markdown: cleanText };
            }

            const trimmedLine = firstLine.trim();
            const markdownLinkMatch = trimmedLine.match(/^\[([^\]]+)\]\(([^)]+)\)\s*$/);
            const bracketLinkMatch = trimmedLine.match(/^\[([^\]]+)\]\s*$/);

            let labelText = '';
            let rawHref = '';

            if (markdownLinkMatch) {
                labelText = markdownLinkMatch[1].trim();
                rawHref = markdownLinkMatch[2].trim();
            } else if (bracketLinkMatch) {
                rawHref = bracketLinkMatch[1].trim();
            } else {
                return { badge: null, markdown: cleanText };
            }

            const href = normalizeBadgeHref(rawHref);
            if (!href) return { badge: null, markdown: cleanText };

            return {
                badge: {
                    href,
                    label: getBadgeLabel(href, labelText, rawHref)
                },
                markdown: lines.slice(1).join('\n')
            };
        }

        function renderEvidenceBadge(badge) {
            if (!badge) return '';

            return `
                <div class="diary-evidence">
                    <a class="diary-link-badge" href="${escapeHtml(badge.href)}" target="_blank" rel="noopener noreferrer">
                        <span class="badge-kicker">Evidence</span>
                        <span class="badge-label">${escapeHtml(badge.label)}</span>
                    </a>
                </div>
            `;
        }

        async function fetchDiaryCard(filename) {
            try {
                const response = await fetch(`./daily/${filename}.md`);
                if (!response.ok) throw new Error();
                const markdownText = await response.text();
                const diaryData = extractEvidenceLink(markdownText);
                const htmlContent = marked.parse(diaryData.markdown);
                const evidenceBadge = renderEvidenceBadge(diaryData.badge);
                const subDate = getSubDateText(filename);

                return `
                    <article class="diary-card">
                        <div class="diary-header">
                            <div class="diary-title-date">${filename}</div>
                            <div class="diary-sub-date">${subDate}</div>
                            ${evidenceBadge}
                        </div>
                        <div class="diary-content">
                            ${htmlContent}
                        </div>
                    </article>
                `;
            } catch (err) {
                return `
                    <article class="diary-card" style="border: 1px dashed red; box-shadow: none;">
                        <div class="diary-header">
                            <div class="diary-title-date" style="color: #d32f2f;">${filename}</div>
                        </div>
                        <div class="diary-content" style="color: #d32f2f; font-size: 0.9rem;">
                            ⚠️ 파일을 불러올 수 없습니다. 경로(daily/${filename}.md)를 확인해 주세요.
                        </div>
                    </article>
                `;
            }
        }

        async function displayPage(page) {
            diaryContainer.innerHTML = '<div class="status-msg">기록을 조심스럽게 꺼내는 중입니다...</div>';
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const startIndex = (page - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageFiles = sortedFiles.slice(startIndex, endIndex);

            if (pageFiles.length === 0) {
                diaryContainer.innerHTML = '<div class="status-msg">아직 기록된 일기가 없습니다.</div>';
                return;
            }

            let htmlAccumulator = '';
            for (const file of pageFiles) {
                htmlAccumulator += await fetchDiaryCard(file);
            }
            diaryContainer.innerHTML = htmlAccumulator;

            const totalPages = Math.ceil(sortedFiles.length / ITEMS_PER_PAGE) || 1;
            pageInfo.textContent = `${page} / ${totalPages}`;
            prevBtn.disabled = (page === 1);
            nextBtn.disabled = (page === totalPages);
        }

        function initDiary() {
            sortedFiles = [...DIARY_FILES].sort((a, b) => b.localeCompare(a));
            displayPage(currentPage);
        }

        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                displayPage(currentPage);
            }
        });

        nextBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(sortedFiles.length / ITEMS_PER_PAGE);
            if (currentPage < totalPages) {
                currentPage++;
                displayPage(currentPage);
            }
        });

        // [수정 3] 자바스크립트 토글 대상을 'dark-mode'에서 'light-mode'로 변경
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
        });

        document.addEventListener('DOMContentLoaded', initDiary);
    </script>
</body>
</html>
